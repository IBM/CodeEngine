# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Application Name
spring.application.name=metrics-example-app

# Actuator Configuration
management.server.port=2112
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoints.web.base-path=/
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Metrics Configuration
metrics.name.prefix=${METRICS_NAME_PREFIX:mymetrics_}

# HTTP Client Configuration
httpbin.base.url=${HTTPBIN_BASE_URL:https://httpbin.org}

# Disable auto-configuration of DataSource when not needed
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration

# Database Configuration (will be overridden by service binding if present)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.root=INFO
logging.level.com.ibm.codeengine.metrics=INFO
logging.pattern.console=%level %logger{36} - %msg%n

