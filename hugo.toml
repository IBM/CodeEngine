baseURL = "https://IBM.github.io/CodeEngine/"
title = "Code Engine Dev Blog"
locale = "en-us"
theme = "github.com/nunocoracao/blowfish/v2"

[module]
  path = "github.com/IBM/CodeEngine"
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  mainSections = ["posts"]

[params.header]
  layout = "sticky"

[params.homepage]
  layout = "card"
  showRecent = true
  showRecentItems = 6
  cardView = true

[params.article]
  showDate = true
  showReadingTime = true
  showThumbnail = true
  showHero = true

[params.search]
  enable = true
  showOnHeader = true
